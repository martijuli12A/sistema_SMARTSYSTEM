<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - Smart System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="colors.css">
  <link rel="stylesheet" href="Style.css">

  <style>
    .admin-container {
      margin-top: 40px;
      margin-bottom: 60px;
      min-height: 60vh;
    }
    
    /* Sistema de Pestañas */
    .admin-tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--gris-claro);
      padding-bottom: 10px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-size: 18px;
      font-weight: 700;
      color: #7b93a8;
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .tab-btn.activo {
      background: var(--azul-principal);
      color: white;
    }

    /* Ocultar secciones */
    .seccion-admin { display: none; }
    .seccion-admin.activa { display: block; }

    /* Tarjetas (Citas y Usuarios) */
    .grid-admin {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .card-admin {
      background: #ffffff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(8,38,63,0.08);
      border-left: 6px solid var(--azul-principal);
      position: relative;
    }
    .card-admin.usuario { border-left-color: var(--verde-principal); }
    .card-admin.bloqueado { border-left-color: #ff4d4d; opacity: 0.7; }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--gris-claro);
      padding-bottom: 10px;
    }
    .card-header h3 {
      color: var(--azul-oscuro);
      font-size: 17px;
    }
    
    /* Controles y Botones */
    .estado-select {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .card-admin p {
      font-size: 14px;
      margin-bottom: 8px;
      color: #4c6879;
    }
    .card-admin strong { color: var(--texto-principal); }
    
    .acciones-card {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed var(--gris-claro);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-peligro {
      background: #ffeeee;
      color: #ff4d4d;
      border: 1px solid #ff4d4d;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-peligro:hover { background: #ff4d4d; color: white; }
    
    .btn-accion {
      background: #eef2ff;
      color: var(--azul-principal);
      border: 1px solid var(--azul-principal);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-accion:hover { background: var(--azul-principal); color: white; }
  </style>
</head>
<body style="background: var(--fondo-general);">

  <header class="header">
    <div class="contenedor nav">
      <div class="logo">
        <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
          <img src="logo1.jpeg" alt="Logo Smart System" class="logo-img">
          <h2>Panel <span class="azul">Admin</span></h2>
        </a>
      </div>
      <div class="nav-acciones">
        <span id="adminNombre" style="margin-right: 15px; font-weight: bold; color: var(--azul-oscuro);"></span>
        <button class="btn-login-nav" id="btnCerrarSesion" type="button">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="contenedor admin-container">
    
    <div class="admin-tabs">
      <button class="tab-btn activo" id="tabCitas">📋 Gestión de Citas</button>
      <button class="tab-btn" id="tabUsuarios">👥 Control de Usuarios</button>
    </div>

    <div id="seccionCitas" class="seccion-admin activa">
      <div class="titulo-seccion" style="text-align: left; margin-bottom: 20px;">
        <h2 style="font-size: 24px;">Citas Activas e Historial</h2>
      </div>
      <div id="contenedorCitas" class="grid-admin">
        <p>Verificando credenciales y cargando citas...</p>
      </div>
    </div>

    <div id="seccionUsuarios" class="seccion-admin">
      <div class="titulo-seccion" style="text-align: left; margin-bottom: 20px;">
        <h2 style="font-size: 24px;">Directorio de Clientes y Empleados</h2>
      </div>
      <div id="contenedorUsuarios" class="grid-admin">
        <p>Cargando perfiles...</p>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
